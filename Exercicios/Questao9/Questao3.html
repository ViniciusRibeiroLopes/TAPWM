<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 3 - 5 Números em Ordem Decrescente</title>
</head>
<body>
    <h1>Questão 3 - 5 Números em Ordem Decrescente</h1>
</body>

<script>
    function ordenarDecrescente(n1, n2, n3, n4, n5) {
        var numeros = [n1, n2, n3, n4, n5];
        numeros.sort(function(a, b) { return b - a; });
        return numeros;
    }

    var resultado = ordenarDecrescente(42, 7, 99, 15, 3);
    alert(`Números originais: 42, 7, 99, 15, 3\nOrdem decrescente: ${resultado.join(', ')}`);

    var nums = [];
    for (var i = 1; i <= 5; i++) {
        var n = parseFloat(prompt(`Digite o ${i}º número:`));
        nums.push(n);
    }
    var ordenado = ordenarDecrescente(nums[0], nums[1], nums[2], nums[3], nums[4]);
    alert(`Números digitados: ${nums.join(', ')}\nOrdem decrescente: ${ordenado.join(', ')}`);
</script>
</html>
