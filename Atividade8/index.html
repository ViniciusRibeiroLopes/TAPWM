<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Atividade 8</h1>
        
        <section class="card">
            <h2>Exercício 1</h2>
            <p>Insira 3 números separados por vírgula:</p>
            <input type="text" id="input1" placeholder="Ex: 2, 4, 6">
            <button id="btn1">Calcular</button>
            <div id="output1" class="output"></div>
        </section>

        <section class="card">
            <h2>Exercício 2</h2>
            <p>Insira 5 letras separadas por vírgula:</p>
            <input type="text" id="input2" placeholder="Ex: A, B, C, D, E">
            <button id="btn2">Gerar Palavras</button>
            <div id="output2" class="output"></div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
