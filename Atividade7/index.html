<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolkit Minimalista</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <header>
            <h1>Atividade 7<span>.</span></h1>
        </header>

        <section>
            <h2>1. Maior Número</h2>
            <div class="controls">
                <div class="input-row">
                    <input type="number" id="num1-1" placeholder="Nº 1">
                    <input type="number" id="num1-2" placeholder="Nº 2">
                    <input type="number" id="num1-3" placeholder="Nº 3">
                </div>
                <button id="btn-maior">Calcular Maior</button>
                <div id="resultado-1" class="result"></div>
            </div>
        </section>

        <section>
            <h2>2. Ordem Crescente</h2>
            <div class="controls">
                <div class="input-row">
                    <input type="number" id="num2-1" placeholder="Nº 1">
                    <input type="number" id="num2-2" placeholder="Nº 2">
                    <input type="number" id="num2-3" placeholder="Nº 3">
                </div>
                <button id="btn-ordenar">Ordenar</button>
                <div id="resultado-2" class="result"></div>
            </div>
        </section>

        <section>
            <h2>3. Palíndromo</h2>
            <div class="controls">
                <div class="input-row">
                    <input type="text" id="texto-palindromo" placeholder="Digite uma palavra ou frase...">
                </div>
                <button id="btn-palindromo">Verificar</button>
                <div id="resultado-3" class="result"></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>

</html>
